<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>5:30am Reflection Logging</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-light: #f7f4ee;
            --bg-dark: #1a1714;
            --surface-light: #ffffff;
            --surface-dark: #2a2620;
            --text-light: #1a1714;
            --text-dark: #e8dfc8;
            --accent: #c17b3a;
            --accent-light: #e8d4b8;
            --border-light: #ddd8ce;
            --border-dark: #3a3530;
            --success: #4a7c59;
        }

        body {
            font-family: 'Playfair Display', serif;
            background: var(--bg-light);
            color: var(--text-light);
            transition: background 0.3s ease, color 0.3s ease;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        body.dark-theme {
            background: var(--bg-dark);
            color: var(--text-dark);
        }

        /* Header with Theme Toggle */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 28px;
            border-bottom: 1px solid var(--border-light);
            background: var(--surface-light);
        }

        body.dark-theme header {
            border-bottom-color: var(--border-dark);
            background: var(--surface-dark);
        }

        .header-title {
            font-size: 18px;
            font-weight: 400;
            letter-spacing: 0.05em;
        }

        .header-buttons {
            display: flex;
            gap: 12px;
        }

        .theme-toggle, .home-btn {
            background: none;
            border: 1px solid var(--border-light);
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            color: var(--text-light);
            transition: all 0.2s;
            font-family: 'DM Sans', sans-serif;
            font-weight: 500;
            text-decoration: none;
        }

        body.dark-theme .theme-toggle,
        body.dark-theme .home-btn {
            border-color: var(--border-dark);
            color: var(--text-dark);
        }

        .theme-toggle:hover, .home-btn:hover {
            background: var(--accent-light);
            color: white;
        }

        /* Main Container */
        .container {
            flex: 1;
            max-width: 700px;
            margin: 0 auto;
            padding: 40px 28px;
            width: 100%;
        }

        /* Quote Section */
        .quote-section {
            margin-bottom: 48px;
            padding: 28px;
            background: var(--surface-light);
            border-radius: 12px;
            border-left: 4px solid var(--accent);
            text-align: center;
        }

        body.dark-theme .quote-section {
            background: var(--surface-dark);
            border-left-color: var(--accent-light);
        }

        .quote-text {
            font-size: 16px;
            font-style: italic;
            line-height: 1.8;
            color: var(--text-light);
            margin-bottom: 12px;
        }

        body.dark-theme .quote-text {
            color: var(--text-dark);
        }

        .quote-date {
            font-size: 12px;
            color: var(--accent);
            font-family: 'DM Sans', sans-serif;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        /* Form Section */
        .form-section {
            background: var(--surface-light);
            padding: 32px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        body.dark-theme .form-section {
            background: var(--surface-dark);
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }

        .form-title {
            font-size: 22px;
            margin-bottom: 28px;
            font-weight: 400;
            color: var(--text-light);
        }

        body.dark-theme .form-title {
            color: var(--text-dark);
        }

        /* Form Groups */
        .form-group {
            margin-bottom: 24px;
        }

        .form-group:last-child {
            margin-bottom: 0;
        }

        label {
            display: block;
            font-family: 'DM Sans', sans-serif;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 8px;
            color: var(--text-light);
            font-weight: 500;
        }

        body.dark-theme label {
            color: var(--text-dark);
        }

        input[type="date"],
        select,
        textarea {
            width: 100%;
            padding: 12px 14px;
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            border: 1px solid var(--border-light);
            border-radius: 6px;
            background: #fafaf8;
            color: var(--text-light);
            transition: border-color 0.2s;
        }

        body.dark-theme input[type="date"],
        body.dark-theme select,
        body.dark-theme textarea {
            background: #1f1a16;
            border-color: var(--border-dark);
            color: var(--text-dark);
        }

        input[type="date"]:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(193, 123, 58, 0.1);
        }

        body.dark-theme input[type="date"]:focus,
        body.dark-theme select:focus,
        body.dark-theme textarea:focus {
            box-shadow: 0 0 0 3px rgba(193, 123, 58, 0.2);
        }

        textarea {
            font-family: 'Playfair Display', serif;
            font-size: 15px;
            line-height: 1.7;
            resize: vertical;
            min-height: 140px;
        }

        textarea::placeholder {
            color: #aaa;
            font-style: italic;
        }

        body.dark-theme textarea::placeholder {
            color: #666;
        }

        /* Two Column Grid for Small Screens */
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .form-row.full {
            grid-template-columns: 1fr;
        }

        @media (max-width: 600px) {
            .form-row {
                grid-template-columns: 1fr;
                gap: 16px;
            }

            .container {
                padding: 24px 16px;
            }

            .form-section {
                padding: 24px 16px;
            }

            .quote-section {
                padding: 20px 16px;
            }

            header {
                padding: 16px;
                flex-direction: row;
            }

            .form-title {
                font-size: 18px;
            }
        }

        /* Button */
        .button-group {
            display: flex;
            gap: 12px;
            margin-top: 32px;
        }

        button {
            padding: 12px 24px;
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            font-weight: 500;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            letter-spacing: 0.03em;
            transition: all 0.2s;
        }

        .submit-btn {
            flex: 1;
            background: var(--accent);
            color: white;
        }

        .submit-btn:hover {
            background: #a5662e;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(193, 123, 58, 0.3);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .submit-btn.loading {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .reset-btn {
            padding: 12px 20px;
            background: transparent;
            border: 1px solid var(--border-light);
            color: var(--text-light);
        }

        body.dark-theme .reset-btn {
            border-color: var(--border-dark);
            color: var(--text-dark);
        }

        .reset-btn:hover {
            background: var(--accent-light);
            color: white;
        }

        /* Status Messages */
        .status-message {
            padding: 12px 14px;
            border-radius: 6px;
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            margin-bottom: 20px;
            display: none;
        }

        .status-message.show {
            display: block;
        }

        .status-message.success {
            background: #e8f5e9;
            color: #2e7d32;
            border: 1px solid #c8e6c9;
        }

        body.dark-theme .status-message.success {
            background: #1b5e20;
            color: #81c784;
            border-color: #2e7d32;
        }

        .status-message.error {
            background: #ffebee;
            color: #c62828;
            border: 1px solid #ffcdd2;
        }

        body.dark-theme .status-message.error {
            background: #b71c1c;
            color: #ef5350;
            border-color: #c62828;
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 20px;
            font-size: 12px;
            color: var(--text-light);
            opacity: 0.6;
            margin-top: auto;
            font-family: 'DM Sans', sans-serif;
        }

        body.dark-theme footer {
            color: var(--text-dark);
        }
    </style>
</head>
<body>
    <header>
        <div class="header-title">Morning Reflection · 5:30am</div>
        <div class="header-buttons">
            <button class="theme-toggle" onclick="toggleTheme()">🌙 Dark</button>
            <a href="index.html" class="home-btn">← Home</a>
        </div>
    </header>

    <div class="container">
        <!-- Quote Section -->
        <div class="quote-section" id="quoteSection">
            <div class="quote-text" id="quoteText">Loading your reflection prompt...</div>
            <div class="quote-date" id="quoteDate"></div>
        </div>

        <!-- Form Section -->
        <div class="form-section">
            <div class="form-title">Log Your Reflection</div>

            <div class="status-message" id="statusMessage"></div>

            <form id="reflectionForm" onsubmit="handleSubmit(event)">
                <!-- Date -->
                <div class="form-group">
                    <label for="entryDate">Date</label>
                    <input type="date" id="entryDate" name="entryDate" required>
                </div>

                <!-- Type -->
                <div class="form-group">
                    <label for="entryType">Entry Type</label>
                    <select id="entryType" name="entryType" onchange="updateSubsections()" required>
                        <option value="">— Select type —</option>
                        <option value="Story Mining">Story Mining</option>
                        <option value="Reflection">Reflection</option>
                        <option value="Commitment">Commitment</option>
                    </select>
                </div>

                <!-- Section and Subsection (Two Columns) -->
                <div class="form-row">
                    <div class="form-group">
                        <label for="mindsetSection">Mindset Section</label>
                        <select id="mindsetSection" name="mindsetSection" onchange="updateSubsections()" required>
                            <option value="">— Select section —</option>
                            <option value="Self-Awareness & Pattern Recognition">Self-Awareness & Pattern Recognition</option>
                            <option value="Authenticity & Ownership">Authenticity & Ownership</option>
                            <option value="Wisdom & Foundation">Wisdom & Foundation</option>
                            <option value="Presence & Awareness & Confidence">Presence & Awareness & Confidence</option>
                            <option value="Thinking & Clarity">Thinking & Clarity</option>
                            <option value="Connection & Relationship & Family">Connection & Relationship & Family</option>
                            <option value="Network & Brand">Network & Brand</option>
                            <option value="Work & Leadership">Work & Leadership</option>
                            <option value="Service & Impact">Service & Impact</option>
                            <option value="Uncategorized">Uncategorized</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="mindsetSubsection">Mindset Subsection</label>
                        <select id="mindsetSubsection" name="mindsetSubsection">
                            <option value="">— Select subsection —</option>
                        </select>
                    </div>
                </div>

                <!-- Description -->
                <div class="form-group form-row full">
                    <label for="description">Description</label>
                    <textarea id="description" name="description" placeholder="What happened? What did you notice? What will you do differently?" required></textarea>
                </div>

                <!-- Buttons -->
                <div class="button-group">
                    <button type="submit" class="submit-btn" id="submitBtn">Submit Entry</button>
                    <button type="reset" class="reset-btn">Clear</button>
                </div>
            </form>
        </div>
    </div>

    <footer>
        Every entry matters. You're building clarity, one reflection at a time.
    </footer>

    <script>
        // Section-Subsection Mapping
        const subsectionMap = {
            "Self-Awareness & Pattern Recognition": [
                "Observe with honesty",
                "Interrogate yourself",
                "Everything starts inside",
                "Change inputs and processing"
            ],
            "Authenticity & Ownership": [
                "Being Yourself",
                "Taking Ownership",
                "Confidence",
                "Patterns to Watch"
            ],
            "Wisdom & Foundation": [
                "Core Values",
                "Long-Term Thinking",
                "Vedic & Spiritual Wisdom",
                "Protection & Boundaries",
                "Body & Health Wisdom",
                "Patterns to Watch"
            ],
            "Presence & Awareness & Confidence": [
                "Presence",
                "Self-Care & Cleanliness",
                "Confidence",
                "Patterns to Watch"
            ],
            "Thinking & Clarity": [
                "Clear Thinking",
                "Learning Mindset",
                "Patterns to Watch"
            ],
            "Connection & Relationship & Family": [
                "Love Payal Better",
                "Connect Better",
                "Family Dynamics",
                "NVC: The Language & Philosophy",
                "Patterns to Watch"
            ],
            "Network & Brand": [
                "Community Building",
                "Networking & Visibility"
            ],
            "Work & Leadership": [
                "Leadership",
                "Quality & Craft",
                "Focus & Energy",
                "Evolution Mindset",
                "Patterns to Watch"
            ],
            "Service & Impact": [
                "Seva & Charity",
                "Seva in Routine",
                "Level-Up Actions"
            ],
            "Uncategorized": [
                "Other",
                "Loose thoughts"
            ]
        };

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            setTodayDate();
            loadQuote();
            applyThemePreference();
        });

        function setTodayDate() {
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('entryDate').value = today;
        }

        function updateSubsections() {
            const section = document.getElementById('mindsetSection').value;
            const subsectionSelect = document.getElementById('mindsetSubsection');

            subsectionSelect.innerHTML = '<option value="">— Select subsection —</option>';

            if (section && subsectionMap[section]) {
                subsectionMap[section].forEach(subsection => {
                    const option = document.createElement('option');
                    option.value = subsection;
                    option.textContent = subsection;
                    subsectionSelect.appendChild(option);
                });
            }
        }

        function loadQuote() {
            // Try to load quotes from JSON file, fallback to defaults
            const defaultQuotes = [
                "Everything starts inside. The only thing we control is our internal response.",
                "When I imagine others getting upset or leaving, I notice fear and tension in me. This tells me I deeply value connection, care, and harmony. I choose to act from integrity rather than fear.",
                "Let fear not drive you. Act from integrity.",
                "Truth is simple; it only has a layer of gold.",
                "Every entry matters. You're building clarity, one reflection at a time."
            ];

            const today = new Date();
            const dayOfYear = Math.floor((today - new Date(today.getFullYear(), 0, 0)) / 86400000);

            // Try to fetch from quotes-placeholder.json
            fetch('./quotes-placeholder.json')
                .then(response => response.json())
                .then(data => {
                    if (data.quotes && data.quotes.length > 0) {
                        const quoteObj = data.quotes[dayOfYear % data.quotes.length];
                        const quoteText = quoteObj.text || quoteObj;
                        const author = quoteObj.author ? ` — ${quoteObj.author}` : '';
                        displayQuote(quoteText, author, today);
                    } else {
                        displayQuote(defaultQuotes[dayOfYear % defaultQuotes.length], '', today);
                    }
                })
                .catch(error => {
                    // If JSON file not found or error, use default quotes
                    console.log('Using default quotes. To customize, update quotes-placeholder.json');
                    displayQuote(defaultQuotes[dayOfYear % defaultQuotes.length], '', today);
                });
        }

        function displayQuote(text, author, date) {
            const authorText = author ? ` ${author}` : '';
            document.getElementById('quoteText').textContent = `"${text}"${authorText}`;
            document.getElementById('quoteDate').textContent = date.toLocaleDateString('en-IN', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });
        }

        function toggleTheme() {
            const body = document.body;
            const isDark = body.classList.toggle('dark-theme');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            updateThemeButtonText();
        }

        function updateThemeButtonText() {
            const isDark = document.body.classList.contains('dark-theme');
            document.querySelector('.theme-toggle').textContent = isDark ? '☀️ Light' : '🌙 Dark';
        }

        function applyThemePreference() {
            const theme = localStorage.getItem('theme') || 'light';
            if (theme === 'dark') {
                document.body.classList.add('dark-theme');
            }
            updateThemeButtonText();
        }

        async function handleSubmit(event) {
            event.preventDefault();

            const submitBtn = document.getElementById('submitBtn');
            const statusMessage = document.getElementById('statusMessage');

            submitBtn.classList.add('loading');
            submitBtn.disabled = true;
            submitBtn.textContent = 'Submitting...';

            // Build form data as URL-encoded (works better with Apps Script)
            const params = new URLSearchParams();
            params.append('date', document.getElementById('entryDate').value);
            params.append('entryType', document.getElementById('entryType').value);
            params.append('section', document.getElementById('mindsetSection').value);
            params.append('subsection', document.getElementById('mindsetSubsection').value);
            params.append('description', document.getElementById('description').value);

            try {
                const response = await fetch('https://script.google.com/macros/s/AKfycbyRQA9sXmDKyYyE2WQAVsy_ixw9ZvQANQbn2vhuMxqPIjc_H6Zfc7E3X2RJpk1IKwLm/exec', {
                    method: 'POST',
                    body: params
                });

                console.log('Response status:', response.status);
                const resultText = await response.text();
                console.log('Response text:', resultText);

                try {
                    const result = JSON.parse(resultText);
                    if (result.success) {
                        showStatus('✓ Entry logged successfully!', 'success');
                        document.getElementById('reflectionForm').reset();
                        setTodayDate();
                    } else {
                        showStatus('Error: ' + (result.message || 'Unknown error'), 'error');
                    }
                } catch (parseError) {
                    // If we get here, assume it worked (Apps Script might not return JSON)
                    if (response.status === 200 || response.ok) {
                        showStatus('✓ Entry submitted! Check your sheet.', 'success');
                        document.getElementById('reflectionForm').reset();
                        setTodayDate();
                    } else {
                        showStatus('Error submitting. Check console.', 'error');
                    }
                }

            } catch (error) {
                showStatus('Network error: ' + error.message, 'error');
                console.error('Error:', error);
            } finally {
                submitBtn.classList.remove('loading');
                submitBtn.disabled = false;
                submitBtn.textContent = 'Submit Entry';
            }
        }

        function showStatus(message, type) {
            const statusMessage = document.getElementById('statusMessage');
            statusMessage.textContent = message;
            statusMessage.className = `status-message show ${type}`;

            setTimeout(() => {
                statusMessage.classList.remove('show');
            }, 3000);
        }
    </script>
</body>
</html>
